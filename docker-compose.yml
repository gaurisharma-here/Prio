services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=productivity_platform
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://prio-backend-latest.onrender.com
    container_name: frontend
    ports:
      - "80:80"
    environment:
      - PORT=80
    depends_on:
      - backend

volumes:
  mongodb_data: